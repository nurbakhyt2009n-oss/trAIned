<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trAIned · AI-тренер</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/style.css">

<style>
/* ====== СТИЛИ ТОЛЬКО ДЛЯ ЧАТА ====== */
html,body{ height:100%; }
body{ overflow:hidden; display:flex; flex-direction:column; }

/* топбар чата (без вкладок) */
.topbar{ position:relative; z-index:5; flex:none; gap:20px; }
.coach-tag{ display:flex; align-items:center; gap:9px; color:var(--text-dim); font-size:14px; }
.coach-tag .pulse{ width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 0 rgba(200,168,106,.5); animation:pulse 2s infinite; }
@keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(200,168,106,.4)} 70%{box-shadow:0 0 0 8px rgba(200,168,106,0)} 100%{box-shadow:0 0 0 0 rgba(200,168,106,0)} }
.top-actions{ margin-left:auto; display:flex; gap:10px; }
.tbtn{
  display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border-radius:var(--radius-sm);
  border:1px solid var(--line-strong); background:transparent; color:var(--text-dim);
  text-decoration:none; font-family:'Manrope',sans-serif; font-size:13px; font-weight:500; cursor:pointer;
  transition:all .2s var(--ease);
}
.tbtn:hover{ color:var(--text); border-color:var(--accent-deep); }

/* область сообщений */
.chat-scroll{ position:relative; z-index:1; flex:1; overflow-y:auto; scroll-behavior:smooth; }
.chat-inner{ max-width:820px; margin:0 auto; padding:36px 24px 24px; }

.msg{ display:flex; gap:14px; margin-bottom:26px; animation:rise .35s var(--ease); }
@keyframes rise{ from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)} }
.msg .avatar{ width:34px; height:34px; flex:none; border-radius:9px; display:grid; place-items:center; font-family:'Unbounded',sans-serif; font-size:13px; font-weight:600; }
.msg.user .avatar{ background:var(--surface-2); color:var(--text-dim); border:1px solid var(--line); }
.msg.coach .avatar{ background:linear-gradient(145deg, var(--accent-bright), var(--accent-deep)); color:var(--bg); }
.msg .body{ flex:1; min-width:0; }
.msg .who{ font-size:12px; color:var(--text-mute); margin-bottom:6px; font-weight:500; }
.msg .bubble{ font-size:15px; line-height:1.7; color:var(--text); white-space:pre-wrap; word-wrap:break-word; }
.msg.user .bubble{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px 18px; display:inline-block; }
.msg.coach .bubble{ color:var(--text-dim); }

.typing{ display:inline-flex; gap:5px; padding:6px 0; }
.typing span{ width:7px; height:7px; border-radius:50%; background:var(--accent); opacity:.4; animation:blink 1.4s infinite; }
.typing span:nth-child(2){ animation-delay:.2s; }
.typing span:nth-child(3){ animation-delay:.4s; }
@keyframes blink{ 0%,60%,100%{opacity:.3; transform:translateY(0)} 30%{opacity:1; transform:translateY(-3px)} }

.welcome{ text-align:center; padding:40px 20px 24px; }
.welcome .emblem{ width:64px; height:64px; margin:0 auto 22px; border-radius:18px; display:grid; place-items:center; background:linear-gradient(145deg, var(--accent-bright), var(--accent-deep)); color:var(--bg); font-family:'Unbounded',sans-serif; font-weight:600; font-size:24px; }
.welcome h1{ font-family:'Unbounded',sans-serif; font-weight:500; font-size:26px; letter-spacing:-.01em; }
.welcome p{ color:var(--text-dim); font-size:15px; margin-top:12px; max-width:460px; margin-left:auto; margin-right:auto; }
.suggestions{ display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:560px; margin:32px auto 0; }
.suggestion{ text-align:left; padding:16px 18px; border-radius:var(--radius); cursor:pointer; background:var(--surface); border:1px solid var(--line); color:var(--text-dim); font-family:'Manrope',sans-serif; font-size:14px; line-height:1.4; transition:all .2s var(--ease); }
.suggestion:hover{ color:var(--text); border-color:var(--accent-deep); transform:translateY(-2px); }

/* поле ввода */
.composer-wrap{ position:relative; z-index:5; flex:none; padding:18px 24px 24px; }
.composer{ max-width:820px; margin:0 auto; display:flex; align-items:flex-end; gap:12px; background:var(--surface); border:1px solid var(--line-strong); border-radius:18px; padding:10px 10px 10px 18px; transition:border-color .2s var(--ease), box-shadow .2s var(--ease); }
.composer:focus-within{ border-color:var(--accent-deep); box-shadow:0 0 0 3px rgba(200,168,106,.1); }
.composer textarea{ flex:1; background:transparent; border:none; outline:none; resize:none; color:var(--text); font-family:'Manrope',sans-serif; font-size:15px; line-height:1.5; max-height:160px; padding:9px 0; }
.composer textarea::placeholder{ color:var(--text-mute); }
.send-btn{ width:42px; height:42px; flex:none; border:none; border-radius:12px; cursor:pointer; background:linear-gradient(180deg, var(--accent-bright), var(--accent)); color:var(--bg); display:grid; place-items:center; transition:transform .15s var(--ease), filter .2s var(--ease); }
.send-btn:hover{ transform:translateY(-1px); filter:brightness(1.05); }
.send-btn:disabled{ opacity:.45; cursor:not-allowed; transform:none; }
.composer-hint{ max-width:820px; margin:10px auto 0; text-align:center; font-size:12px; color:var(--text-mute); }

.chat-scroll::-webkit-scrollbar{ width:10px; }
.chat-scroll::-webkit-scrollbar-thumb{ background:var(--line-strong); border-radius:10px; border:3px solid var(--bg); }

/* toast выше, т.к. снизу поле ввода */
.toast{ bottom:100px; }

@media (max-width:680px){
  .topbar{ padding:14px 18px; }
  .coach-tag span.lbl{ display:none; }
  .chat-inner{ padding:24px 16px; }
  .suggestions{ grid-template-columns:1fr; }
  .composer-wrap{ padding:14px 14px 18px; }
}
</style>
</head>

<body>

<nav class="topbar">
  <a class="brand" href="/dashboard.html">tr<span class="hl">AI</span>ned</a>
  <div class="coach-tag"><span class="pulse"></span><span class="lbl">AI-тренер на связи</span></div>
  <div class="top-actions">
    <button class="tbtn" id="clearBtn">Очистить</button>
    <a class="tbtn" href="/dashboard.html">← Дашборд</a>
  </div>
</nav>

<div class="chat-scroll" id="chatScroll">
  <div class="chat-inner" id="chatInner">
    <div class="welcome" id="welcome">
      <div class="emblem">AI</div>
      <h1>Чем помочь сегодня?</h1>
      <p>Я знаю твой профиль, последний чек-ин и план питания. Спрашивай про тренировки, еду, восстановление — отвечу по твоим цифрам.</p>
      <div class="suggestions">
        <button class="suggestion">Можно ли сегодня тренироваться тяжело?</button>
        <button class="suggestion">Что съесть после тренировки для массы?</button>
        <button class="suggestion">Как пробить плато в подтягиваниях?</button>
        <button class="suggestion">Составь сплит на массу под мой уровень</button>
      </div>
    </div>
  </div>
</div>

<div class="composer-wrap">
  <div class="composer">
    <textarea id="input" rows="1" placeholder="Спроси тренера…"></textarea>
    <button class="send-btn" id="sendBtn" title="Отправить">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <p class="composer-hint">Тренер не ставит диагнозы. При боли и травмах — к врачу.</p>
</div>

<div class="toast" id="toast"></div>

<script src="/app.js"></script>
<script>
/* ====== ЛОГИКА AI-ЧАТА ====== */
const scroll   = document.getElementById('chatScroll');
const inner    = document.getElementById('chatInner');
const welcome  = document.getElementById('welcome');
const input    = document.getElementById('input');
const sendBtn  = document.getElementById('sendBtn');

let busy = false;

function scrollDown(){ scroll.scrollTop = scroll.scrollHeight; }

function addMessage(role, text){
  if(welcome) welcome.style.display = 'none';
  const isUser = role === 'user';
  const msg = document.createElement('div');
  msg.className = 'msg ' + (isUser ? 'user' : 'coach');
  msg.innerHTML = '<div class="avatar">' + (isUser ? 'Я' : 'AI') + '</div>' +
    '<div class="body"><div class="who">' + (isUser ? 'Ты' : 'AI-тренер') + '</div><div class="bubble"></div></div>';
  msg.querySelector('.bubble').textContent = text;
  inner.appendChild(msg);
  scrollDown();
  return msg;
}

function addTyping(){
  if(welcome) welcome.style.display = 'none';
  const msg = document.createElement('div');
  msg.className = 'msg coach';
  msg.id = 'typingMsg';
  msg.innerHTML = '<div class="avatar">AI</div><div class="body"><div class="who">AI-тренер</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>';
  inner.appendChild(msg);
  scrollDown();
}
function removeTyping(){
  const t = document.getElementById('typingMsg');
  if(t) t.remove();
}

input.addEventListener('input', ()=>{
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
});

async function loadHistory(){
  try{
    const history = await apiGet('/api/chat/history');
    if(history.length > 0){
      welcome.style.display = 'none';
      history.forEach(m => addMessage(m.role, m.content));
    }
  }catch(err){
    showToast('Сервер недоступен. Запущен ли uvicorn?');
  }
}

async function sendMessage(text){
  if(busy || !text.trim()) return;
  busy = true;
  sendBtn.disabled = true;

  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  addTyping();

  try{
    const data = await apiPost('/api/chat', { message: text });
    removeTyping();
    addMessage('assistant', data.reply || 'Пустой ответ.');
  }catch(err){
    removeTyping();
    addMessage('assistant', 'Не удалось получить ответ. Проверь, что сервер запущен.');
  }finally{
    busy = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.addEventListener('click', ()=> sendMessage(input.value));
input.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage(input.value);
  }
});
$$('.suggestion').forEach(s=>{
  s.addEventListener('click', ()=> sendMessage(s.textContent));
});

document.getElementById('clearBtn').addEventListener('click', async ()=>{
  if(!confirm('Очистить всю историю чата? Это нельзя отменить.')) return;
  try{
    await apiDelete('/api/chat/history');
    $$('.msg').forEach(m=>m.remove());
    welcome.style.display = 'block';
    showToast('История очищена');
  }catch(err){
    showToast('Не удалось очистить');
  }
});

loadHistory();
input.focus();
</script>
</body>
</html>
